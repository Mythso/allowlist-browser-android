kind = "mobile"
previewPath = "/"
title = "Allowlist Browser"
version = "1.0.0"
id = "artifacts/allowlist-browser"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20787

[services.development]
run = "pnpm --filter @workspace/allowlist-browser run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/allowlist-browser", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/allowlist-browser", "run", "serve" ]

[services.env]
PORT = "20787"
BASE_PATH = "/"
